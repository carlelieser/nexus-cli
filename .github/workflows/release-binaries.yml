name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            os: macos
            arch: arm64
          - runner: ubuntu-latest
            os: linux
            arch: x64
          - runner: windows-latest
            os: win
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm prune --omit=dev

      - name: Assemble archive
        shell: bash
        run: scripts/build-archive.sh ${{ matrix.os }} ${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nexus-${{ matrix.os }}-${{ matrix.arch }}
          path: binaries/nexus-${{ matrix.os }}-${{ matrix.arch }}.*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: binaries
          merge-multiple: true

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: binaries/*
          fail_on_unmatched_files: true
