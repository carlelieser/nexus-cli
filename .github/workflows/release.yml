name: release

# Build standalone binaries on a version tag and publish them to a GitHub
# Release. Bun cross-compiles every target from one runner.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binaries
        run: bash scripts/build-binaries.sh release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/nexus-darwin-arm64
            release/nexus-darwin-x64
            release/nexus-linux-x64
            release/nexus-win-x64.exe
            release/SHA256SUMS
          generate_release_notes: true
