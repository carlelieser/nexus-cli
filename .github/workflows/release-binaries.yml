name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon runner
            target: node22-macos-arm64
            asset: nexus-macos-arm64
          - os: macos-13 # Intel runner
            target: node22-macos-x64
            asset: nexus-macos-x64
          - os: ubuntu-latest
            target: node22-linux-x64
            asset: nexus-linux-x64
          - os: windows-latest
            target: node22-win-x64
            asset: nexus-win-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build:bundle

      - name: Build binary
        run: >
          npx pkg build/bundle/index.cjs
          --config package.json
          --target ${{ matrix.target }}
          --output binaries/${{ matrix.asset }}

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: binaries/${{ matrix.asset }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          fail_on_unmatched_files: true
